# 天气 Agent 配置示例
# 基于 MCP 彩云天气服务构建的天气查询 Agent

id: weather-agent
name: 天气查询助手
description: 提供实时天气查询和预报服务的智能助手

# LLM 配置
llm_config:
  provider: ${LLM_PROVIDER:openai}
  api_key: ${OPENAI_API_KEY}
  model: ${LLM_MODEL:gpt-4}
  temperature: 0.7

# 内置工具配置
tools: []

# MCP 服务器配置
mcp_servers:
  - id: caiyun-weather
    name: 彩云天气
    description: 提供中国天气预报服务
    command: uvx
    args:
      - mcp-caiyun-weather
    env:
      CAIYUN_WEATHER_API_TOKEN: ${CAIYUN_WEATHER_API_TOKEN}
    enabled: true
    timeout: 30000

# MCP 工具配置（可选，用于自定义工具行为）
mcp_tools:
  - server_id: caiyun-weather
    tool_name: get_realtime_weather
    enabled: true
    description_override: "获取指定位置的实时天气信息，包括温度、湿度、风速等"
  
  - server_id: caiyun-weather
    tool_name: get_weather_forecast
    enabled: true
    description_override: "获取指定位置的天气预报，包括未来几天的天气情况"

# Function Call 配置
function_call:
  strategy: auto
  max_iterations: 5
  timeout: 10000

# 过滤器配置
filters:
  - enabled: true
    name: audit
    type: audit
    priority: 10
    config:
      enable_request_logging: true
      enable_response_logging: true
      log_sensitive_data: false
      log_level: info
  
  - enabled: true
    name: input_validation
    type: input_validation
    priority: 100
    config:
      max_message_length: 5000
      max_metadata_size: 1024
      blocked_words: []
      required_fields: []
      allowed_content_types:
        - application/json
  
  - enabled: true
    name: output_processing
    type: output_processing
    priority: 200
    config:
      sanitize_output: true
      max_response_size: 10485760
      add_response_headers: true
      cors_headers: true
      compression_enabled: false
