# 默认 Agent 配置
# 这是系统的默认配置，包含所有硬编码的配置项

id: zero
name: Zero Agent
description: 系统默认的Agent配置，包含计算器和天气工具

# LLM 配置（从环境变量读取）
# api_key 会根据 provider 自动从对应的环境变量获取：
# - openai -> OPENAI_API_KEY
# - anthropic -> ANTHROPIC_API_KEY
# - siliconflow -> SILICONFLOW_API_KEY
llm_config:
  provider: ${LLM_PROVIDER:openai}
  api_key: ""  # 自动根据 provider 从环境变量获取
  model: ${LLM_MODEL:gpt-4}
  temperature: 0.7

# 内置工具配置
tools:
  - id: calculator
    name: calculator
    description: 高级数学计算器，支持丰富的数学运算和函数
    parameters:
      type: object
      properties:
        expression:
          type: string
          description: 数学表达式，支持：基本运算(+-*/), 幂运算(**), 函数(sqrt, sin, cos, tan, log, ln, exp, abs, factorial), 常量(pi, e)
      required:
        - expression
    handler:
      type: function
      module: tools.builtin.calculator
      function: calculate
      timeout: 5000
    enabled: true

# MCP 服务器配置
mcp_servers:
  # 彩云天气工具
  # 如需启用，请先运行:
  # npx @modelcontextprotocol/inspector uvx mcp-caiyun-weather
  - id: caiyun-weather
    name: 彩云天气
    description: 提供中国天气预报服务
    command: uvx
    args:
      - mcp-caiyun-weather
    env:
      CAIYUN_WEATHER_API_TOKEN: ${CAIYUN_WEATHER_API_TOKEN:huE0COxlM2CCc2ES}
    enabled: true
    timeout: 30000
  # 可以添加更多MCP服务器
  # - id: filesystem
  #   name: 文件系统工具
  #   description: 提供文件系统操作工具
  #   command: npx
  #   args:
  #     - -y
  #     - "@modelcontextprotocol/server-filesystem"
  #     - "/tmp"
  #   enabled: true

# MCP 工具配置（可选，用于自定义配置）
mcp_tools: []
  # 可以在这里自定义特定工具的配置
  # - server_id: caiyun-weather
  #   tool_name: get_realtime_weather
  #   enabled: true
  #   description_override: "获取指定位置的实时天气信息"

# Function Call 配置
function_call:
  strategy: auto
  max_iterations: 3
  timeout: 10000

# 过滤器配置
filters:
  - enabled: true
    name: audit
    type: audit
    priority: 10
    config:
      enable_request_logging: true
      enable_response_logging: true
      log_sensitive_data: false
      log_level: info
  
  - enabled: true
    name: input_validation
    type: input_validation
    priority: 100
    config:
      max_message_length: 10000
      max_metadata_size: 1024
      blocked_words:
        - spam
        - inappropriate
      required_fields: []
      allowed_content_types:
        - application/json
  
  - enabled: true
    name: output_processing
    type: output_processing
    priority: 200
    config:
      sanitize_output: true
      max_response_size: 10485760  # 10MB
      add_response_headers: true
      cors_headers: true
      compression_enabled: false
