version: '3.8'

services:
  agent-core:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - API_HOST=0.0.0.0
      - API_PORT=8082
      - LOG_LEVEL=INFO
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
