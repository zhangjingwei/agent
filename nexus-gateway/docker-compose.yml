version: '3.8'

services:
  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api-gateway
    ports:
      - "8080:8080"
    environment:
      - PYTHON_AGENT_HOST=agent-core
      - PYTHON_AGENT_PORT=8082
      - REDIS_HOST=redis
      - LOG_LEVEL=info
    depends_on:
      - agent-core
      - redis
    networks:
      - nexus-network
    restart: unless-stopped

  file-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.file-service
    ports:
      - "8081:8081"
    environment:
      - FILE_WORKERS=100
      - FILE_ALLOWED_PATHS=/tmp,/app/data
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - /tmp:/tmp
    networks:
      - nexus-network
    restart: unless-stopped

  agent-core:
    image: nexus-agent:latest
    ports:
      - "8082:8082"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - nexus-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nexus-network
    restart: unless-stopped

  # Monitoring services (optional)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - nexus-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - nexus-network
    restart: unless-stopped

volumes:
  redis_data:
  grafana_data:

networks:
  nexus-network:
    driver: bridge
